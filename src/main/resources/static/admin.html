<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>축가 관리자 페이지</title>
</head>
<body>

<h1>축가 신청 관리</h1>

<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>신청자</th>
        <th>예식장</th>
        <th>곡명</th>
        <th>상태</th>
        <th>관리</th>
    </tr>
    </thead>

    <tbody id="requestTable">
    </tbody>
</table>
<script>
fetch("/song-requests")
    .then(response => response.json())
    .then(data => {
        const table = document.getElementById("requestTable");

        data.forEach(request => {
            const buttons = getStatusButtons(request);

            const row = `
                <tr>
                    <td>${request.id}</td>
                    <td>${request.applicantName}</td>
                    <td>${request.weddingPlace}</td>
                    <td>${request.songTitle}</td>
                    <td>${getStatusText(request.status)}</td>
                    <td>${buttons}</td>
                </tr>
            `;

            table.innerHTML += row;
        });
    });

function getStatusText(status) {
    if (status === "REQUESTED") return "신청완료";
    if (status === "APPROVED") return "승인완료";
    if (status === "REJECTED") return "거절";
    if (status === "COMPLETED") return "축가완료";
    return status;
}

function getStatusButtons(request) {
    if (request.status === "REQUESTED") {
        return `
            <button onclick='changeStatus(${request.id}, "APPROVED")'>승인</button>
            <button onclick='changeStatus(${request.id}, "REJECTED")'>거절</button>
        `;
    }

    if (request.status === "APPROVED") {
        return `
            <button onclick='changeStatus(${request.id}, "COMPLETED")'>축가완료</button>
        `;
    }

    return "-";
}

function changeStatus(id, status) {
    fetch(`/song-requests/${id}/status`, {
        method: "PATCH",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ status: status })
    })
    .then(response => {
        if (!response.ok) {
            throw new Error("상태 변경 실패");
        }
        return response.json();
    })
    .then(data => {
        alert("상태가 변경되었습니다.");
        location.reload();
    })
    .catch(error => {
        alert(error.message);
    });
}
</script>
</body>
</html>
