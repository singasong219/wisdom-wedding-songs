<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>회원가입 | Wisdom Wedding Songs</title>

  <style>
    body {
        margin: 0;
        font-family: 'Malgun Gothic', sans-serif;
        background: linear-gradient(135deg, #ffd6e7, #e6d6ff, #e8f4ff, #ffffff);
        color: #333;
    }

    nav {
        height: 70px;
        padding: 0 70px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: white;
        border-bottom: 1px solid #e6d6ff;
    }

    .logo {
        font-size: 24px;
        font-weight: bold;
        color: #9ea7b8;
    }

    .menu a {
        margin-left: 25px;
        text-decoration: none;
        color: #555;
        font-weight: bold;
    }

    .signup-box {
        width: 460px;
        margin: 80px auto;
        padding: 55px 45px;
        background: rgba(255,255,255,0.92);
        border-radius: 30px;
        border: 1px solid #dcecff;
        box-shadow: 0 15px 40px rgba(150,170,190,0.2);
        text-align: center;
    }

    h1 {
        color: #9ea7b8;
        margin-bottom: 12px;
    }

    .desc {
        color: #777;
        margin-bottom: 35px;
    }

    input {
        width: 100%;
        padding: 15px;
        margin-bottom: 16px;
        border: 1px solid #e6d6ff;
        border-radius: 15px;
        font-size: 15px;
        box-sizing: border-box;
    }

    button {
        width: 100%;
        padding: 16px;
        border: none;
        border-radius: 30px;
        background: #b8bec9;
        color: white;
        font-weight: bold;
        font-size: 16px;
        cursor: pointer;
    }

    button:hover {
        background: #9ea7b8;
    }

    .link {
        margin-top: 25px;
        color: #777;
        font-size: 14px;
    }

    .link a {
        color: #b98fd8;
        text-decoration: none;
        font-weight: bold;
    }
  </style>
</head>

<body>

<nav>
  <div class="logo">Wisdom Wedding Songs</div>

  <div class="menu">
    <a href="index.html">Home</a>
    <a href="song-request.html">Booking</a>
    <a href="singers.html">Singers</a>
    <a href="login.html">Login</a>
  </div>
</nav>

<div class="signup-box">
  <h1>Sign Up</h1>

  <div class="desc">
    회원가입 후 웨딩 축가 서비스를 이용해보세요.
  </div>

  <form id="signupForm">
    <input type="text" id="name" placeholder="이름">
    <input type="text" id="email" placeholder="이메일">
    <input type="password" id="password" placeholder="비밀번호">
    <input type="password" id="passwordCheck" placeholder="비밀번호 확인">
    <input type="text" id="role" value="USER" readonly>

    <button type="submit">회원가입</button>
  </form>

  <div class="link">
    이미 회원이신가요?
    <a href="login.html">로그인</a>
  </div>
</div>
<script>
  document.getElementById("signupForm").addEventListener("submit", function (event) {
      event.preventDefault();

      const password = document.getElementById("password").value;
      const passwordCheck = document.getElementById("passwordCheck").value;

      if (password !== passwordCheck) {
          alert("비밀번호가 일치하지 않습니다.");
          return;
      }

      const signupData = {
          email: document.getElementById("email").value,
          password: password,
          name: document.getElementById("name").value,
          role: document.getElementById("role").value
      };

      fetch("/members/signup", {
          method: "POST",
          headers: {
              "Content-Type": "application/json"
          },
          body: JSON.stringify(signupData)
      })
      .then(response => {
          if (response.ok) {
              alert("회원가입이 완료되었습니다.");
              location.href = "login.html";
          } else {
              alert("회원가입에 실패했습니다.");
          }
      })
      .catch(error => {
          console.error(error);
          alert("서버 연결 중 오류가 발생했습니다.");
      });
  });
</script>
</body>
</html>
